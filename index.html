<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Archive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --border-bright: #444;
    --text: #e8e8e0;
    --muted: #666;
    --accent: #f0508a;
    --acid: #c8f060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  #count-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  #about-btn {
    background: transparent;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    transition: color 0.15s;
  }

  #about-btn:hover { color: var(--text); }

  #auth-btn {
    margin-left: auto;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border-bright);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  #auth-btn:hover { color: var(--text); border-color: var(--text); }

  #add-btn {
    display: none;
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  #add-btn:hover { background: #f570a0; }

  #about-panel {
    display: none;
    width: 100%;
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    background: var(--bg);
  }

  #about-panel p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    line-height: 1.8;
    color: var(--muted);
    max-width: 480px;
  }

  #grid-wrap {
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    width: 100%;
    gap: 16px;
  }

  #qr-controls {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .mode-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.2s;
  }

  .mode-label.active { color: var(--accent); }
  #lbl-gallery.active { color: var(--acid); }

  #toggle-track {
    width: 44px;
    height: 24px;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s;
  }

  #toggle-track:hover { border-color: #555; }

  #toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    transition: transform 0.25s cubic-bezier(.4,0,.2,1), background 0.2s;
  }

  #toggle-track.gallery #toggle-thumb {
    transform: translateX(20px);
    background: var(--acid);
  }

  #qr-outer {
    background: #0e080c;
    padding: 18px;
    border-radius: 3px;
    transition: box-shadow 0.35s ease;
  }

  #qr-outer.gallery-mode {
    box-shadow: 0 0 0 1px var(--acid), 0 0 28px 4px rgba(200,240,96,0.18), 0 0 60px 10px rgba(200,240,96,0.08);
  }

  #qr-grid {
    display: grid;
    gap: 1px;
  }

  .qr-cell {
    width: 16px;
    height: 16px;
    border-radius: 1px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  .qr-cell.on  { background: var(--accent); }
  .qr-cell.off { background: #180e14; }
  .qr-cell.d-on  { background: var(--accent); }
  .qr-cell.d-off { background: #180e14; }

  .qr-cell.d-img { cursor: pointer; }
  .qr-cell.d-img .qr-solid {
    position: absolute; inset: 0;
    background: var(--accent);
    transition: opacity 0.35s ease;
  }
  .qr-cell.d-img .img-layer {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.35s ease;
  }

  #qr-outer.gallery-mode .qr-cell.on  { background: #1a2010; }
  #qr-outer.gallery-mode .qr-cell.off { background: #0e1008; }
  #qr-outer.gallery-mode .qr-cell.d-on  { background: #1a2010; }
  #qr-outer.gallery-mode .qr-cell.d-off { background: #0e1008; }
  #qr-outer.gallery-mode .qr-cell.d-img .qr-solid { opacity: 0; }
  #qr-outer.gallery-mode .qr-cell.d-img .img-layer { opacity: 1; }
  #qr-outer.gallery-mode .qr-cell.d-img:hover {
    outline: 2px solid var(--acid);
    z-index: 2;
  }

  #qr-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  #qr-counter span { color: var(--accent); }

  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #overlay.open { display: flex; }

  #modal {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    width: 400px;
    max-width: 95vw;
    padding: 24px;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #modal h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .field input[type=text] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input[type=text]:focus { border-color: var(--accent); }
  .field input[type=text]::placeholder { color: var(--muted); }

  #drop-zone {
    border: 1px dashed var(--border-bright);
    background: var(--bg);
    height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }

  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(240,80,138,0.04);
  }

  #drop-zone span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }

  #drop-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  #preview-wrap {
    display: none;
    position: relative;
    height: 100px;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    overflow: hidden;
  }

  #preview-wrap img { width: 100%; height: 100%; object-fit: contain; }

  #preview-clear {
    position: absolute;
    top: 6px; right: 6px;
    background: rgba(13,13,13,0.85);
    border: 1px solid var(--border-bright);
    color: var(--muted);
    font-size: 14px;
    width: 22px; height: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #preview-clear:hover { color: var(--text); }

  #modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  #modal-actions button {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 9px;
    cursor: pointer;
    border: 1px solid var(--border-bright);
    transition: background 0.15s, color 0.15s;
  }

  #btn-cancel { background: transparent; color: var(--muted); }
  #btn-cancel:hover { background: var(--border); color: var(--text); }
  #btn-save { background: var(--accent); color: #0d0d0d; border-color: var(--accent); }
  #btn-save:hover { background: #f570a0; }
  #btn-delete { background: transparent; color: #e05555; border-color: #3a2020; flex: 0; padding: 9px 12px; }
  #btn-delete:hover { background: #3a2020; }

  #status-msg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 10px;
    letter-spacing: 0.06em;
    min-height: 14px;
    text-align: center;
  }

  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    cursor: zoom-out;
  }

  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 88vw;
    max-height: 80vh;
    object-fit: contain;
    border: 1px solid var(--border-bright);

  #lightbox-info { text-align: center; }

  #lightbox-info p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  #lightbox-info a {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
  }

  #lightbox-info a:hover { color: var(--text); }

  #lightbox-close {
    position: fixed;
    top: 20px; right: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px;
  }

  #lightbox-close:hover { color: var(--text); }

  #register-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #register-panel.open { display: flex; }

  #register-box {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    width: 340px;
    max-width: 95vw;
    padding: 24px;
    animation: slideUp 0.2s ease;
  }

  #register-box h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  #register-box p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 18px;
  }

  #register-box button {
    width: 100%;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px;
    cursor: pointer;
    border: 1px solid var(--border-bright);
    margin-bottom: 8px;
    transition: all 0.15s;
  }

  #btn-do-register { background: var(--accent); color: #0d0d0d; border-color: var(--accent); }
  #btn-do-register:hover { background: #f570a0; }
  #btn-close-register { background: transparent; color: var(--muted); }
  #btn-close-register:hover { background: var(--border); color: var(--text); }

  #register-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    min-height: 14px;
    text-align: center;
  }
</style>

<body>

<header>
  <h1>YCOT</h1>
  <span id="count-label">loading...</span>
  <button id="about-btn" onclick="toggleAbout()">About ↓</button>

<div id="about-panel">

</div>

<div id="grid-wrap">

    <h2 id="modal-heading">Add QR code</h2>
    <div class="field">

    <div class="field">

    </div>
    <div class="field">
      <label>Image</label>
      <div id="drop-zone">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#f0508a" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
        <span>Drop image or click to browse</span>
        <input type="file" accept="image/*" id="file-input" />
      </div>
      <div id="preview-wrap">

    <button id="btn-do-register" onclick="doRegister()">Register with biometrics</button>
    <button id="btn-close-register" onclick="closeRegister()">Cancel</button>
    <div id="register-status"></div>
  </div>
</div>

<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">Close ×</button>
  <img id="lightbox-img" src="" alt="" />

    <p id="lightbox-title"></p>
    <a id="lightbox-url" href="#" target="_blank" rel="noopener"></a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://erfxdudxgjyoyqvitaou.supabase.co';
const SUPABASE_KEY = 'sb_publishable_NIzNV__7lY4ZQ2Hpq7HTFA_QtUmW3zM';
const OWNER_USER_ID = '8cc58288-dd11-4a67-8b50-156dd6f75f9c';
const BUCKET = 'qr-images';

let isAuthenticated = false;
let editIdx = null;
let pendingFile = null;
let entries = [];

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function api(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + path, {
    headers: { ...headers, ...(opts.headers || {}) },
    ...opts
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadEntries() {
  try {
    const data = await api('/rest/v1/qr_entries?select=*&order=added_at.asc');
    entries = data || [];
    render();
  } catch(e) {
    console.error('Load error', e);
    document.getElementById('count-label').textContent = 'error';
  }
}

// ── QR MOSAIC ────────────────────────────────────────────────────────────────

const QR_N = 33;
let galleryMode = false;
let qrCellDivs = [];  // flat array, indexed by r*QR_N+c
let dataSlots = [];   // [{r,c,idx}] in order

function makeRng(seed) {
  let x = seed;
  return () => { x = (x * 1664525 + 1013904223) & 0xffffffff; return (x >>> 0) / 4294967296; };
}

function buildQRMatrix(n) {
  const m = Array.from({length:n}, () => new Array(n).fill(null));

  function setFinder(r, c) {
    for (let dr=0;dr<7;dr++) for (let dc=0;dc<7;dc++) {
      const border = dr===0||dr===6||dc===0||dc===6;
      const core   = dr>=2&&dr<=4&&dc>=2&&dc<=4;
      m[r+dr][c+dc] = (border||core) ? 'on' : 'off';
    }
    for (let i=-1;i<=7;i++) {
      const s = v => v>=0&&v<n;
      if(s(r+i)&&s(c-1)) m[r+i][c-1] = m[r+i][c-1] ?? 'off';
      if(s(r+i)&&s(c+7)) m[r+i][c+7] = m[r+i][c+7] ?? 'off';
      if(s(r-1)&&s(c+i)) m[r-1][c+i] = m[r-1][c+i] ?? 'off';
      if(s(r+7)&&s(c+i)) m[r+7][c+i] = m[r+7][c+i] ?? 'off';
    }
  }

  const end = n - 7;
  setFinder(0,0); setFinder(0,end); setFinder(end,0);

  for (let i=8;i<end;i++) {
    if (!m[6][i]) m[6][i] = (i%2===0)?'on':'off';
    if (!m[i][6]) m[i][6] = (i%2===0)?'on':'off';
  }
  m[end+1][8] = 'on';

  const rng = makeRng(0xc0ffee42);
  [[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8],
   [8,end],[8,end+1],[8,end+2],[8,end+3],[8,end+4],[8,end+5],[8,end+6],
   [end,8],[end+1,8],[end+2,8],[end+3,8],[end+4,8],[end+5,8],[end+6,8]]
  .forEach(([r,c]) => { if (m[r]&&m[r][c]===null) m[r][c] = rng()>0.5?'on':'off'; });

  for (let i=0;i<6;i++) for (let j=n-11;j<n-8;j++) if(m[i]&&!m[i][j]) m[i][j]=rng()>0.5?'on':'off';
  for (let i=n-11;i<n-8;i++) for (let j=0;j<6;j++) if(m[i]&&!m[i][j]) m[i][j]=rng()>0.5?'on':'off';

  function setAlign(r, c) {
    for (let dr=-2;dr<=2;dr++) for (let dc=-2;dc<=2;dc++) {
      const rr=r+dr, cc=c+dc;
      if (rr<0||rr>=n||cc<0||cc>=n||m[rr][cc]!==null) continue;
      const outer=Math.abs(dr)===2||Math.abs(dc)===2, inner=dr===0&&dc===0;
      m[rr][cc]=(outer||inner)?'on':'off';
    }
  }
  [[6,26],[26,6],[26,26]].forEach(([r,c])=>setAlign(r,c));

  const dataRng = makeRng(0xdeadbeef);
  for (let r=0;r<n;r++) for (let c=0;c<n;c++)
    if (!m[r][c]) m[r][c] = dataRng()>0.5 ? 'data-on' : 'data-off';

  return m;
}

const qrMatrix = buildQRMatrix(QR_N);

function initQRGrid() {
  const grid = document.getElementById('qr-grid');
  grid.style.gridTemplateColumns = `repeat(${QR_N}, 16px)`;
  grid.innerHTML = '';
  qrCellDivs = [];
  dataSlots = [];

  for (let r=0;r<QR_N;r++) for (let c=0;c<QR_N;c++) {
    const div = document.createElement('div');
    div.className = 'qr-cell';
    const t = qrMatrix[r][c];
    if (t==='on') div.classList.add('on');
    else if (t==='off') div.classList.add('off');
    else if (t==='data-on') div.classList.add('d-on');
    else div.classList.add('d-off');
    grid.appendChild(div);
    qrCellDivs.push(div);
    if (t==='data-on'||t==='data-off') dataSlots.push({r,c,flatIdx:r*QR_N+c});
  }
}

function render() {
  const total = 256;
  const slots = dataSlots.slice(0, total);

  // reset all data cells to their seeded state first
  slots.forEach(({flatIdx}, i) => {
    const div = qrCellDivs[flatIdx];
    // remove img classes, restore seeded color
    if (div.classList.contains('d-img')) {
      div.className = 'qr-cell ' + (qrMatrix[Math.floor(flatIdx/QR_N)][flatIdx%QR_N] === 'data-on' ? 'd-on' : 'd-off');
      div.innerHTML = '';
    }
  });

  entries.forEach((e, i) => {
    if (i >= slots.length) return;
    const {flatIdx} = slots[i];
    const div = qrCellDivs[flatIdx];
    div.className = 'qr-cell d-img';
    div.innerHTML = '';

    const solid = document.createElement('div');
    solid.className = 'qr-solid';
    div.appendChild(solid);

    if (e.image_path) {
      const img = document.createElement('img');
      img.className = 'img-layer';
      img.src = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${e.image_path}`;
      img.alt = e.title;
      div.appendChild(img);
    } else {
      const canvas = document.createElement('canvas');
      canvas.className = 'img-layer';
      canvas.width = 40; canvas.height = 40;
      drawFallbackQR(canvas, e.url || e.title || '');
      div.appendChild(canvas);
    }

    div.onclick = () => {
      if (galleryMode) {
        if (isAuthenticated) openModal(i);
        else if (e.image_path) openLightbox(e);
      }
    };
  });

  // add button: find first empty slot after entries
  const addSlotIdx = entries.length;
  if (isAuthenticated && addSlotIdx < slots.length) {
    const {flatIdx} = slots[addSlotIdx];
    const div = qrCellDivs[flatIdx];
    div.className = 'qr-cell d-img';
    div.innerHTML = '';
    const solid = document.createElement('div');
    solid.className = 'qr-solid';
    solid.style.background = 'transparent';
    solid.style.border = '1px dashed #f0508a';
    div.appendChild(solid);
    div.onclick = () => openModal();
  }

  document.getElementById('qr-filled').textContent = entries.length;
  document.getElementById('count-label').textContent = `${entries.length} / 256`;
}

function toggleMode() {
  galleryMode = !galleryMode;
  document.getElementById('toggle-track').classList.toggle('gallery', galleryMode);
  document.getElementById('qr-outer').classList.toggle('gallery-mode', galleryMode);
  document.getElementById('lbl-qr').classList.toggle('active', !galleryMode);
  document.getElementById('lbl-gallery').classList.toggle('active', galleryMode);
}

// initialise grid immediately, data loads after
initQRGrid();

function setAuthenticated(val) {
  isAuthenticated = val;
  document.getElementById('add-btn').style.display = val ? '' : 'none';
  document.getElementById('auth-btn').textContent = val ? 'Authenticated ✓' : 'Unlock';
  document.getElementById('auth-btn').style.color = val ? 'var(--accent)' : '';
  render();
}

function toggleAbout() {
  const panel = document.getElementById('about-panel');
  const btn = document.getElementById('about-btn');
  const open = panel.style.display === 'block';
  panel.style.display = open ? 'none' : 'block';
  btn.textContent = open ? 'About ↓' : 'About ↑';
}

function bufferToBase64url(buffer) {
  const bytes = new Uint8Array(buffer);
  let str = '';
  for (const b of bytes) str += String.fromCharCode(b);
  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

function base64urlToBuffer(base64url) {
  const base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
  const binary = atob(base64);
  const buffer = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) buffer[i] = binary.charCodeAt(i);
  return buffer.buffer;
}

async function getCredentials() {
  try {
    const data = await api(`/rest/v1/passkey_credentials?user_id=eq.${OWNER_USER_ID}&select=credential_id,public_key,counter`);
    return data || [];
  } catch(e) { return []; }
}

async function handleAuthBtn() {
  if (isAuthenticated) return;
  const creds = await getCredentials();
  if (creds.length === 0) {
    document.getElementById('register-panel').classList.add('open');
  } else {
    await doAuthenticate(creds);
  }
}

async function doRegister() {
  const status = document.getElementById('register-status');
  status.textContent = 'waiting for biometric...';
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const credential = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: 'QR Archive', id: location.hostname },
        user: {
          id: new TextEncoder().encode(OWNER_USER_ID),
          name: 'owner',
          displayName: 'Archive Owner'
        },
        pubKeyCredParams: [
          { type: 'public-key', alg: -7 },
          { type: 'public-key', alg: -257 }
        ],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required'
        },
        timeout: 60000
      }
    });

    const credId = bufferToBase64url(credential.rawId);
    const pubKey = bufferToBase64url(credential.response.getPublicKey
      ? credential.response.getPublicKey()
      : credential.response.attestationObject);

    await api('/rest/v1/passkey_credentials', {
      method: 'POST',
      body: JSON.stringify({
        user_id: OWNER_USER_ID,
        credential_id: credId,
        public_key: pubKey,
        counter: 0
      })
    });

    status.textContent = 'registered!';
    setTimeout(() => { closeRegister(); setAuthenticated(true); }, 1000);
  } catch(e) {
    status.textContent = 'error: ' + (e.message || 'registration failed');
  }
}

async function doAuthenticate(creds) {
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const allowCreds = creds.map(c => ({
      type: 'public-key',
      id: base64urlToBuffer(c.credential_id),
      transports: ['internal']
    }));
    await navigator.credentials.get({
      publicKey: { challenge, allowCredentials: allowCreds, userVerification: 'required', timeout: 60000 }
    });
    setAuthenticated(true);
  } catch(e) {
    if (e.name !== 'NotAllowedError') console.error('Auth error', e);
  }
}

function closeRegister() {
  document.getElementById('register-panel').classList.remove('open');
  document.getElementById('register-status').textContent = '';
}

function openModal(idx) {
  if (!isAuthenticated) return;
  editIdx = (idx !== undefined) ? idx : null;
  pendingFile = null;
  const entry = editIdx !== null ? entries[editIdx] : null;
  document.getElementById('inp-title').value = entry ? entry.title : '';
  document.getElementById('inp-url').value = entry ? (entry.url || '') : '';
  document.getElementById('modal-heading').textContent = entry ? 'Edit entry' : 'Add QR code';
  document.getElementById('btn-delete').style.display = entry ? '' : 'none';
  document.getElementById('btn-save').textContent = entry ? 'Save' : 'Add';
  document.getElementById('status-msg').textContent = '';
  document.getElementById('file-input').value = '';
  if (entry && entry.image_path) {
    showPreview(`${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${entry.image_path}`);
  } else {
    clearImageState();
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-title').focus(), 60);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editIdx = null;
  pendingFile = null;
}

function showPreview(src) {
  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('preview-wrap').style.display = 'block';
  document.getElementById('preview-img').src = src;
}

function clearImageState() {
  document.getElementById('drop-zone').style.display = '';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('preview-img').src = '';
  pendingFile = null;
}

function clearImage(e) {
  e.stopPropagation();
  clearImageState();
  document.getElementById('file-input').value = '';
}

document.getElementById('file-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  pendingFile = file;
  showPreview(URL.createObjectURL(file));
  if (!document.getElementById('inp-title').value) {
    document.getElementById('inp-title').value = file.name.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ');
  }
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  pendingFile = file;
  showPreview(URL.createObjectURL(file));
  if (!document.getElementById('inp-title').value) {
    document.getElementById('inp-title').value = file.name.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ');
  }
});

async function saveEntry() {
  const title = document.getElementById('inp-title').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  if (!title) { document.getElementById('inp-title').focus(); return; }
  const statusEl = document.getElementById('status-msg');
  statusEl.textContent = 'saving...';
  document.getElementById('btn-save').disabled = true;
  try {
    let image_path = editIdx !== null ? entries[editIdx].image_path : null;
    if (pendingFile) {
      const ext = pendingFile.name.split('.').pop();
      const filename = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${filename}`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': pendingFile.type },
        body: pendingFile
      });
      if (!uploadRes.ok) throw new Error('Image upload failed');
      image_path = filename;
    }
    if (editIdx !== null) {
      await api(`/rest/v1/qr_entries?id=eq.${entries[editIdx].id}`, {
        method: 'PATCH',
        body: JSON.stringify({ title, url, image_path })
      });
    } else {
      await api('/rest/v1/qr_entries', {
        method: 'POST',
        body: JSON.stringify({ title, url, image_path })
      });
    }
    await loadEntries();
    closeModal();
  } catch(e) {
    statusEl.textContent = 'error: ' + (e.message || 'save failed');
    document.getElementById('btn-save').disabled = false;
  }
}

async function deleteEntry() {
  if (editIdx === null) return;
  const id = entries[editIdx].id;
  const imagePath = entries[editIdx].image_path;
  try {
    await api(`/rest/v1/qr_entries?id=eq.${id}`, { method: 'DELETE' });
    if (imagePath) {
      await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${imagePath}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
    }
    await loadEntries();
    closeModal();
  } catch(e) {
    document.getElementById('status-msg').textContent = 'delete failed';
  }
}

function openLightbox(e) {
  document.getElementById('lightbox-img').src = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${e.image_path}`;
  document.getElementById('lightbox-title').textContent = e.title;
  const urlEl = document.getElementById('lightbox-url');
  if (e.url) {
    urlEl.textContent = e.url;
    urlEl.href = e.url.startsWith('http') ? e.url : '#';
    urlEl.style.display = '';
  } else {
    urlEl.style.display = 'none';
  }
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function drawFallbackQR(canvas, text) {
  const N = 21;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#161616';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const seed = text.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  let x = seed;
  const rng = () => { x = (x * 1664525 + 1013904223) & 0xffffffff; return (x >>> 0) / 4294967296; };
  const mat = Array.from({length: N}, () => new Array(N).fill(0));
  const finder = (r, c) => { for(let dr=0;dr<7;dr++) for(let dc=0;dc<7;dc++) { const d=(dr===0||dr===6||dc===0||dc===6||(dr>=2&&dr<=4&&dc>=2&&dc<=4)); if(r+dr<N&&c+dc<N) mat[r+dr][c+dc]=d?1:-1; } };
  finder(0,0); finder(0,14); finder(14,0);
  for(let i=0;i<N;i++) { mat[6][i]=mat[i][6]=(i%2===0)?1:-1; }
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) { if(mat[r][c]===0) mat[r][c]=rng()>0.45?1:-1; }
  const cell = canvas.width/N;
  ctx.fillStyle = '#f0508a';
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) { if(mat[r][c]===1) ctx.fillRect(Math.round(c*cell), Math.round(r*cell), Math.ceil(cell), Math.ceil(cell)); }
}

document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLightbox(); });
document.getElementById('overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('register-panel').addEventListener('click', function(e) { if (e.target === this) closeRegister(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeLightbox(); closeRegister(); }
  if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')) {
    if (document.activeElement.tagName !== 'BUTTON') saveEntry();
  }
});

loadEntries();
</script>

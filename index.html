<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Archive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --border-bright: #444;
    --text: #e8e8e0;
    --muted: #666;
    --accent: #c8f060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  #count-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  #about-btn {
    background: transparent;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    transition: color 0.15s;
  }

  #about-btn:hover { color: var(--text); }

  #auth-btn {
    margin-left: auto;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border-bright);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  #auth-btn:hover { color: var(--text); border-color: var(--text); }

  #add-btn {
    display: none;
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  #add-btn:hover { background: #d9ff6e; }

  #about-panel {
    display: none;
    width: 100%;
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    background: var(--bg);
  }

  #about-panel p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    line-height: 1.8;
    color: var(--muted);
    max-width: 480px;
  }

  #grid-wrap {
    padding: 32px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    width: 100%;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 2px;
    width: min(calc(100vw - 40px), 560px);
    aspect-ratio: 1;
  }

  .tile {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: border-color 0.15s;
    aspect-ratio: 1;
  }

  .tile:hover { border-color: var(--accent); z-index: 2; }

  .tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(20%);
    transition: filter 0.2s;
  }

  .tile:hover img { filter: grayscale(0%); }

  .tile-num {
    position: absolute;
    bottom: 2px;
    right: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 6px;
    color: var(--muted);
    opacity: 0.35;
    line-height: 1;
    pointer-events: none;
  }

  .tile:hover .tile-num { opacity: 0.7; }

  .tile-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(13,13,13,0.92);
    padding: 3px 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 7px;
    color: var(--accent);
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    transform: translateY(2px);
    transition: opacity 0.15s, transform 0.15s;
  }

  .tile:hover .tile-label { opacity: 1; transform: translateY(0); }

  .tile-add {
    position: relative;
    cursor: pointer;
    background: transparent;
    border: 1px dashed var(--border-bright);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    aspect-ratio: 1;
  }

  .tile-add:hover { border-color: var(--accent); background: rgba(200,240,96,0.04); }
  .tile-add svg { opacity: 0.3; transition: opacity 0.15s; width: 40%; height: 40%; }
  .tile-add:hover svg { opacity: 1; }

  @keyframes vacancy-pulse {
    0%, 100% { opacity: 0.18; }
    50% { opacity: 0.38; }
  }

  .tile-vacant {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    animation: vacancy-pulse 3s ease-in-out infinite;
    aspect-ratio: 1;
  }

  .tile-vacant:nth-child(3n+1) { animation-delay: 0s; }
  .tile-vacant:nth-child(3n+2) { animation-delay: 1s; }
  .tile-vacant:nth-child(3n+3) { animation-delay: 2s; }

  .tile-vacant .tile-num {
    position: absolute;
    bottom: 2px;
    right: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 6px;
    color: var(--muted);
    opacity: 0.25;
    line-height: 1;
    pointer-events: none;
  }

  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #overlay.open { display: flex; }

  #modal {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    width: 400px;
    max-width: 95vw;
    padding: 24px;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #modal h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .field input[type=text] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input[type=text]:focus { border-color: var(--accent); }
  .field input[type=text]::placeholder { color: var(--muted); }

  #drop-zone {
    border: 1px dashed var(--border-bright);
    background: var(--bg);
    height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }

  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(200,240,96,0.04);
  }

  #drop-zone span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }

  #drop-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  #preview-wrap {
    display: none;
    position: relative;
    height: 100px;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    overflow: hidden;
  }

  #preview-wrap img { width: 100%; height: 100%; object-fit: contain; }

  #preview-clear {
    position: absolute;
    top: 6px; right: 6px;
    background: rgba(13,13,13,0.85);
    border: 1px solid var(--border-bright);
    color: var(--muted);
    font-size: 14px;
    width: 22px; height: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #preview-clear:hover { color: var(--text); }

  #modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  #modal-actions button {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 9px;
    cursor: pointer;
    border: 1px solid var(--border-bright);
    transition: background 0.15s, color 0.15s;
  }

  #btn-cancel { background: transparent; color: var(--muted); }
  #btn-cancel:hover { background: var(--border); color: var(--text); }
  #btn-save { background: var(--accent); color: #0d0d0d; border-color: var(--accent); }
  #btn-save:hover { background: #d9ff6e; }
  #btn-delete { background: transparent; color: #e05555; border-color: #3a2020; flex: 0; padding: 9px 12px; }
  #btn-delete:hover { background: #3a2020; }

  #status-msg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 10px;
    letter-spacing: 0.06em;
    min-height: 14px;
    text-align: center;
  }

  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    cursor: zoom-out;
  }

  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 88vw;
    max-height: 80vh;
    object-fit: contain;
    border: 1px solid var(--border-bright);
  }

  #lightbox-info { text-align: center; }

  #lightbox-info p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  #lightbox-info a {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
  }

  #lightbox-info a:hover { color: var(--text); }

  #lightbox-close {
    position: fixed;
    top: 20px; right: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px;
  }

  #lightbox-close:hover { color: var(--text); }

  #register-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #register-panel.open { display: flex; }

  #register-box {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    width: 340px;
    max-width: 95vw;
    padding: 24px;
    animation: slideUp 0.2s ease;
  }

  #register-box h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  #register-box p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 18px;
  }

  #register-box button {
    width: 100%;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px;
    cursor: pointer;
    border: 1px solid var(--border-bright);
    margin-bottom: 8px;
    transition: all 0.15s;
  }

  #btn-do-register { background: var(--accent); color: #0d0d0d; border-color: var(--accent); }
  #btn-do-register:hover { background: #d9ff6e; }
  #btn-close-register { background: transparent; color: var(--muted); }
  #btn-close-register:hover { background: var(--border); color: var(--text); }

  #register-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    min-height: 14px;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>YCOT</h1>
  <span id="count-label">loading...</span>
  <button id="about-btn" onclick="toggleAbout()">About ↓</button>
  <button id="auth-btn" onclick="handleAuthBtn()">Unlock</button>
  <button id="add-btn" onclick="openModal()">+ Add</button>
</header>

<div id="about-panel">
  <p>testing</p>
</div>

<div id="grid-wrap">
  <div id="grid"></div>
</div>

<div id="overlay">
  <div id="modal">
    <h2 id="modal-heading">Add QR code</h2>
    <div class="field">
      <label>Title</label>
      <input id="inp-title" type="text" placeholder="e.g. New Museum ticket" />
    </div>
    <div class="field">
      <label>URL or note</label>
      <input id="inp-url" type="text" placeholder="e.g. https://... or ticket #101320878" />
    </div>
    <div class="field">
      <label>Image</label>
      <div id="drop-zone">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#c8f060" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
        <span>Drop image or click to browse</span>
        <input type="file" accept="image/*" id="file-input" />
      </div>
      <div id="preview-wrap">
        <img id="preview-img" src="" alt="preview" />
        <button id="preview-clear" onclick="clearImage(event)">×</button>
      </div>
    </div>
    <div id="modal-actions">
      <button id="btn-cancel" onclick="closeModal()">Cancel</button>
      <button id="btn-delete" style="display:none" onclick="deleteEntry()">Delete</button>
      <button id="btn-save" onclick="saveEntry()">Add</button>
    </div>
    <div id="status-msg"></div>
  </div>
</div>

<div id="register-panel">
  <div id="register-box">
    <h2>Register this device</h2>
    <p>Set up Touch ID or Face ID on this device so you can add and edit QR codes. You only do this once per device.</p>
    <button id="btn-do-register" onclick="doRegister()">Register with biometrics</button>
    <button id="btn-close-register" onclick="closeRegister()">Cancel</button>
    <div id="register-status"></div>
  </div>
</div>

<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">Close ×</button>
  <img id="lightbox-img" src="" alt="" />
  <div id="lightbox-info">
    <p id="lightbox-title"></p>
    <a id="lightbox-url" href="#" target="_blank" rel="noopener"></a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://erfxdudxgjyoyqvitaou.supabase.co';
const SUPABASE_KEY = 'sb_publishable_NIzNV__7lY4ZQ2Hpq7HTFA_QtUmW3zM';
const OWNER_USER_ID = '8cc58288-dd11-4a67-8b50-156dd6f75f9c';
const BUCKET = 'qr-images';

let isAuthenticated = false;
let editIdx = null;
let pendingFile = null;
let entries = [];

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function api(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + path, {
    headers: { ...headers, ...(opts.headers || {}) },
    ...opts
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadEntries() {
  try {
    const data = await api('/rest/v1/qr_entries?select=*&order=added_at.asc');
    entries = data || [];
    render();
  } catch(e) {
    console.error('Load error', e);
    document.getElementById('count-label').textContent = 'error';
  }
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  entries.forEach((e, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';

    if (e.image_path) {
      const img = document.createElement('img');
      img.src = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${e.image_path}`;
      img.alt = e.title;
      tile.appendChild(img);
    } else {
      const canvas = document.createElement('canvas');
      canvas.width = 80; canvas.height = 80;
      canvas.style.width = '100%';
      canvas.style.height = '100%';
      drawFallbackQR(canvas, e.url || e.title || '');
      tile.appendChild(canvas);
    }

    const label = document.createElement('div');
    label.className = 'tile-label';
    label.textContent = e.title;
    tile.appendChild(label);

    const num = document.createElement('div');
    num.className = 'tile-num';
    num.textContent = i;
    tile.appendChild(num);

    tile.addEventListener('click', () => {
      if (isAuthenticated) openModal(i);
      else if (e.image_path) openLightbox(e);
    });

    grid.appendChild(tile);
  });

  if (isAuthenticated) {
    const addTile = document.createElement('div');
    addTile.className = 'tile-add';
    addTile.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="#c8f060" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>`;
    addTile.addEventListener('click', () => openModal());
    grid.appendChild(addTile);
  }

  const filled = entries.length;
  const addSlot = isAuthenticated ? 1 : 0;
  const remaining = 256 - filled - addSlot;
  for (let i = 0; i < remaining; i++) {
    const vacant = document.createElement('div');
    vacant.className = 'tile-vacant';
    const num = document.createElement('div');
    num.className = 'tile-num';
    num.textContent = filled + addSlot + i;
    vacant.appendChild(num);
    grid.appendChild(vacant);
  }

  const c = entries.length;
  document.getElementById('count-label').textContent = `${c} / 256`;
}

function setAuthenticated(val) {
  isAuthenticated = val;
  document.getElementById('add-btn').style.display = val ? '' : 'none';
  document.getElementById('auth-btn').textContent = val ? 'Authenticated ✓' : 'Unlock';
  document.getElementById('auth-btn').style.color = val ? 'var(--accent)' : '';
  render();
}

function toggleAbout() {
  const panel = document.getElementById('about-panel');
  const btn = document.getElementById('about-btn');
  const open = panel.style.display === 'block';
  panel.style.display = open ? 'none' : 'block';
  btn.textContent = open ? 'About ↓' : 'About ↑';
}

function bufferToBase64url(buffer) {
  const bytes = new Uint8Array(buffer);
  let str = '';
  for (const b of bytes) str += String.fromCharCode(b);
  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

function base64urlToBuffer(base64url) {
  const base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
  const binary = atob(base64);
  const buffer = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) buffer[i] = binary.charCodeAt(i);
  return buffer.buffer;
}

async function getCredentials() {
  try {
    const data = await api(`/rest/v1/passkey_credentials?user_id=eq.${OWNER_USER_ID}&select=credential_id,public_key,counter`);
    return data || [];
  } catch(e) { return []; }
}

async function handleAuthBtn() {
  if (isAuthenticated) return;
  const creds = await getCredentials();
  if (creds.length === 0) {
    document.getElementById('register-panel').classList.add('open');
  } else {
    await doAuthenticate(creds);
  }
}

async function doRegister() {
  const status = document.getElementById('register-status');
  status.textContent = 'waiting for biometric...';
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const credential = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: 'QR Archive', id: location.hostname },
        user: {
          id: new TextEncoder().encode(OWNER_USER_ID),
          name: 'owner',
          displayName: 'Archive Owner'
        },
        pubKeyCredParams: [
          { type: 'public-key', alg: -7 },
          { type: 'public-key', alg: -257 }
        ],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required'
        },
        timeout: 60000
      }
    });

    const credId = bufferToBase64url(credential.rawId);
    const pubKey = bufferToBase64url(credential.response.getPublicKey
      ? credential.response.getPublicKey()
      : credential.response.attestationObject);

    await api('/rest/v1/passkey_credentials', {
      method: 'POST',
      body: JSON.stringify({
        user_id: OWNER_USER_ID,
        credential_id: credId,
        public_key: pubKey,
        counter: 0
      })
    });

    status.textContent = 'registered!';
    setTimeout(() => { closeRegister(); setAuthenticated(true); }, 1000);
  } catch(e) {
    status.textContent = 'error: ' + (e.message || 'registration failed');
  }
}

async function doAuthenticate(creds) {
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const allowCreds = creds.map(c => ({
      type: 'public-key',
      id: base64urlToBuffer(c.credential_id),
      transports: ['internal']
    }));
    await navigator.credentials.get({
      publicKey: { challenge, allowCredentials: allowCreds, userVerification: 'required', timeout: 60000 }
    });
    setAuthenticated(true);
  } catch(e) {
    if (e.name !== 'NotAllowedError') console.error('Auth error', e);
  }
}

function closeRegister() {
  document.getElementById('register-panel').classList.remove('open');
  document.getElementById('register-status').textContent = '';
}

function openModal(idx) {
  if (!isAuthenticated) return;
  editIdx = (idx !== undefined) ? idx : null;
  pendingFile = null;
  const entry = editIdx !== null ? entries[editIdx] : null;
  document.getElementById('inp-title').value = entry ? entry.title : '';
  document.getElementById('inp-url').value = entry ? (entry.url || '') : '';
  document.getElementById('modal-heading').textContent = entry ? 'Edit entry' : 'Add QR code';
  document.getElementById('btn-delete').style.display = entry ? '' : 'none';
  document.getElementById('btn-save').textContent = entry ? 'Save' : 'Add';
  document.getElementById('status-msg').textContent = '';
  document.getElementById('file-input').value = '';
  if (entry && entry.image_path) {
    showPreview(`${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${entry.image_path}`);
  } else {
    clearImageState();
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-title').focus(), 60);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editIdx = null;
  pendingFile = null;
}

function showPreview(src) {
  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('preview-wrap').style.display = 'block';
  document.getElementById('preview-img').src = src;
}

function clearImageState() {
  document.getElementById('drop-zone').style.display = '';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('preview-img').src = '';
  pendingFile = null;
}

function clearImage(e) {
  e.stopPropagation();
  clearImageState();
  document.getElementById('file-input').value = '';
}

document.getElementById('file-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  pendingFile = file;
  showPreview(URL.createObjectURL(file));
  if (!document.getElementById('inp-title').value) {
    document.getElementById('inp-title').value = file.name.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ');
  }
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  pendingFile = file;
  showPreview(URL.createObjectURL(file));
  if (!document.getElementById('inp-title').value) {
    document.getElementById('inp-title').value = file.name.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ');
  }
});

async function saveEntry() {
  const title = document.getElementById('inp-title').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  if (!title) { document.getElementById('inp-title').focus(); return; }
  const statusEl = document.getElementById('status-msg');
  statusEl.textContent = 'saving...';
  document.getElementById('btn-save').disabled = true;
  try {
    let image_path = editIdx !== null ? entries[editIdx].image_path : null;
    if (pendingFile) {
      const ext = pendingFile.name.split('.').pop();
      const filename = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${filename}`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': pendingFile.type },
        body: pendingFile
      });
      if (!uploadRes.ok) throw new Error('Image upload failed');
      image_path = filename;
    }
    if (editIdx !== null) {
      await api(`/rest/v1/qr_entries?id=eq.${entries[editIdx].id}`, {
        method: 'PATCH',
        body: JSON.stringify({ title, url, image_path })
      });
    } else {
      await api('/rest/v1/qr_entries', {
        method: 'POST',
        body: JSON.stringify({ title, url, image_path })
      });
    }
    await loadEntries();
    closeModal();
  } catch(e) {
    statusEl.textContent = 'error: ' + (e.message || 'save failed');
    document.getElementById('btn-save').disabled = false;
  }
}

async function deleteEntry() {
  if (editIdx === null) return;
  const id = entries[editIdx].id;
  const imagePath = entries[editIdx].image_path;
  try {
    await api(`/rest/v1/qr_entries?id=eq.${id}`, { method: 'DELETE' });
    if (imagePath) {
      await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${imagePath}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
    }
    await loadEntries();
    closeModal();
  } catch(e) {
    document.getElementById('status-msg').textContent = 'delete failed';
  }
}

function openLightbox(e) {
  document.getElementById('lightbox-img').src = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${e.image_path}`;
  document.getElementById('lightbox-title').textContent = e.title;
  const urlEl = document.getElementById('lightbox-url');
  if (e.url) {
    urlEl.textContent = e.url;
    urlEl.href = e.url.startsWith('http') ? e.url : '#';
    urlEl.style.display = '';
  } else {
    urlEl.style.display = 'none';
  }
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function drawFallbackQR(canvas, text) {
  const N = 21;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#161616';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const seed = text.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  let x = seed;
  const rng = () => { x = (x * 1664525 + 1013904223) & 0xffffffff; return (x >>> 0) / 4294967296; };
  const mat = Array.from({length: N}, () => new Array(N).fill(0));
  const finder = (r, c) => { for(let dr=0;dr<7;dr++) for(let dc=0;dc<7;dc++) { const d=(dr===0||dr===6||dc===0||dc===6||(dr>=2&&dr<=4&&dc>=2&&dc<=4)); if(r+dr<N&&c+dc<N) mat[r+dr][c+dc]=d?1:-1; } };
  finder(0,0); finder(0,14); finder(14,0);
  for(let i=0;i<N;i++) { mat[6][i]=mat[i][6]=(i%2===0)?1:-1; }
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) { if(mat[r][c]===0) mat[r][c]=rng()>0.45?1:-1; }
  const cell = canvas.width/N;
  ctx.fillStyle = '#c8f060';
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) { if(mat[r][c]===1) ctx.fillRect(Math.round(c*cell), Math.round(r*cell), Math.ceil(cell), Math.ceil(cell)); }
}

document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLightbox(); });
document.getElementById('overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('register-panel').addEventListener('click', function(e) { if (e.target === this) closeRegister(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeLightbox(); closeRegister(); }
  if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')) {
    if (document.activeElement.tagName !== 'BUTTON') saveEntry();
  }
});

loadEntries();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Archive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --border-bright: #444;
    --text: #e8e8e0;
    --muted: #666;
    --accent: #c8f060;
    --accent-dim: #8aaa30;
    --tile: 120px;
    --gap: 3px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 28px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  header span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  #add-btn {
    margin-left: auto;
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  #add-btn:hover { background: #d9ff6e; }
  #add-btn:active { transform: scale(0.97); }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, var(--tile));
    gap: var(--gap);
    padding: var(--gap);
  }

  .tile {
    width: var(--tile);
    height: var(--tile);
    position: relative;
    cursor: pointer;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: border-color 0.15s;
  }

  .tile:hover { border-color: var(--accent); z-index: 2; }

  .tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(20%);
    transition: filter 0.2s;
  }

  .tile:hover img { filter: grayscale(0%); }

  .tile-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(13,13,13,0.9);
    padding: 5px 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    transform: translateY(2px);
    transition: opacity 0.15s, transform 0.15s;
  }

  .tile:hover .tile-label { opacity: 1; transform: translateY(0); }

  .tile-add {
    width: var(--tile);
    height: var(--tile);
    background: transparent;
    border: 1px dashed var(--border-bright);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }

  .tile-add:hover {
    border-color: var(--accent);
    background: rgba(200,240,96,0.04);
  }

  .tile-add svg { opacity: 0.3; transition: opacity 0.15s; }
  .tile-add:hover svg { opacity: 1; }

  /* Modal */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #overlay.open { display: flex; }

  #modal {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    width: 420px;
    max-width: 95vw;
    padding: 28px;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #modal h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }

  #drop-zone {
    border: 1px dashed var(--border-bright);
    background: var(--bg);
    height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }

  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(200,240,96,0.04);
  }

  #drop-zone span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }

  #drop-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  #preview-wrap {
    display: none;
    position: relative;
    height: 120px;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    overflow: hidden;
  }

  #preview-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  #preview-clear {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(13,13,13,0.85);
    border: 1px solid var(--border-bright);
    color: var(--muted);
    font-size: 14px;
    width: 24px;
    height: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
  }

  #preview-clear:hover { color: var(--text); }

  #modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 24px;
  }

  #modal-actions button {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px;
    cursor: pointer;
    border: 1px solid var(--border-bright);
    transition: background 0.15s, color 0.15s;
  }

  #btn-cancel {
    background: transparent;
    color: var(--muted);
  }

  #btn-cancel:hover { background: var(--border); color: var(--text); }

  #btn-save {
    background: var(--accent);
    color: #0d0d0d;
    border-color: var(--accent);
  }

  #btn-save:hover { background: #d9ff6e; }

  #btn-delete {
    background: transparent;
    color: #e05555;
    border-color: #3a2020;
    flex: 0;
    padding: 10px 14px;
  }

  #btn-delete:hover { background: #3a2020; }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    cursor: zoom-out;
  }

  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 88vw;
    max-height: 80vh;
    object-fit: contain;
    border: 1px solid var(--border-bright);
  }

  #lightbox-info {
    text-align: center;
  }

  #lightbox-info p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  #lightbox-info a {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-decoration: none;
  }

  #lightbox-info a:hover { color: var(--text); }

  #lightbox-close {
    position: fixed;
    top: 20px;
    right: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px;
  }

  #lightbox-close:hover { color: var(--text); }

  .empty-state {
    grid-column: 1 / -1;
    padding: 60px 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    line-height: 2;
  }
</style>
</head>
<body>

<header>
  <h1>QR Archive</h1>
  <span id="count-label">0 codes</span>
  <button id="add-btn" onclick="openModal()">+ Add code</button>
</header>

<div id="grid"></div>

<div id="overlay">
  <div id="modal">
    <h2 id="modal-heading">Add QR code</h2>

    <div class="field">
      <label>Title</label>
      <input id="inp-title" type="text" placeholder="e.g. New Museum ticket" />
    </div>

    <div class="field">
      <label>URL or note</label>
      <input id="inp-url" type="text" placeholder="e.g. https://... or ticket #101320878" />
    </div>

    <div class="field">
      <label>Image</label>
      <div id="drop-zone">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#c8f060" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
        <span>Drop image or click to browse</span>
        <input type="file" accept="image/*" id="file-input" />
      </div>
      <div id="preview-wrap">
        <img id="preview-img" src="" alt="preview" />
        <button id="preview-clear" onclick="clearImage(event)">×</button>
      </div>
    </div>

    <div id="modal-actions">
      <button id="btn-cancel" onclick="closeModal()">Cancel</button>
      <button id="btn-delete" style="display:none" onclick="deleteEntry()">Delete</button>
      <button id="btn-save" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">Close ×</button>
  <img id="lightbox-img" src="" alt="" />
  <div id="lightbox-info">
    <p id="lightbox-title"></p>
    <a id="lightbox-url" href="#" target="_blank" rel="noopener"></a>
  </div>
</div>

<script>
  const STORAGE_KEY = 'qr-archive-v1';
  let entries = [];
  let editIdx = null;
  let pendingImage = null;

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) entries = JSON.parse(raw);
    } catch(e) { entries = []; }
    render();
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (entries.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = '// no codes yet — add your first one';
      grid.appendChild(empty);
    }

    entries.forEach((e, i) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.title = e.title;

      if (e.image) {
        const img = document.createElement('img');
        img.src = e.image;
        img.alt = e.title;
        tile.appendChild(img);
      } else {
        const canvas = document.createElement('canvas');
        canvas.width = 120; canvas.height = 120;
        drawFallbackQR(canvas, e.url || e.title || '');
        tile.appendChild(canvas);
      }

      const label = document.createElement('div');
      label.className = 'tile-label';
      label.textContent = e.title;
      tile.appendChild(label);

      tile.addEventListener('click', () => {
        if (e.image) openLightbox(e);
        else openModal(i);
      });
      tile.addEventListener('contextmenu', (ev) => { ev.preventDefault(); openModal(i); });

      grid.appendChild(tile);
    });

    const addTile = document.createElement('div');
    addTile.className = 'tile-add';
    addTile.title = 'Add a QR code';
    addTile.innerHTML = `<svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="#c8f060" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>`;
    addTile.addEventListener('click', () => openModal());
    grid.appendChild(addTile);

    const count = entries.length;
    document.getElementById('count-label').textContent = count === 1 ? '1 code' : `${count} codes`;
  }

  function drawFallbackQR(canvas, text) {
    const N = 21;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#161616';
    ctx.fillRect(0, 0, 120, 120);
    const seed = text.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    let x = seed;
    const rng = () => { x = (x * 1664525 + 1013904223) & 0xffffffff; return (x >>> 0) / 4294967296; };
    const mat = Array.from({length: N}, () => new Array(N).fill(0));
    const finder = (r, c) => { for(let dr=0;dr<7;dr++) for(let dc=0;dc<7;dc++) { const d=(dr===0||dr===6||dc===0||dc===6||(dr>=2&&dr<=4&&dc>=2&&dc<=4)); if(r+dr<N&&c+dc<N) mat[r+dr][c+dc]=d?1:-1; } };
    finder(0,0); finder(0,14); finder(14,0);
    for(let i=0;i<N;i++) { mat[6][i]=mat[i][6]=(i%2===0)?1:-1; }
    for(let r=0;r<N;r++) for(let c=0;c<N;c++) { if(mat[r][c]===0) mat[r][c]=rng()>0.45?1:-1; }
    const cell = 120/N;
    ctx.fillStyle = '#c8f060';
    for(let r=0;r<N;r++) for(let c=0;c<N;c++) { if(mat[r][c]===1) ctx.fillRect(Math.round(c*cell), Math.round(r*cell), Math.ceil(cell), Math.ceil(cell)); }
  }

  function openModal(idx) {
    editIdx = (idx !== undefined) ? idx : null;
    pendingImage = null;
    document.getElementById('inp-title').value = editIdx !== null ? entries[editIdx].title : '';
    document.getElementById('inp-url').value = editIdx !== null ? entries[editIdx].url : '';
    document.getElementById('modal-heading').textContent = editIdx !== null ? 'Edit entry' : 'Add QR code';
    document.getElementById('btn-delete').style.display = editIdx !== null ? '' : 'none';
    document.getElementById('btn-save').textContent = editIdx !== null ? 'Save' : 'Add';
    document.getElementById('file-input').value = '';

    if (editIdx !== null && entries[editIdx].image) {
      showPreview(entries[editIdx].image);
      pendingImage = entries[editIdx].image;
    } else {
      clearImageState();
    }

    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('inp-title').focus(), 60);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editIdx = null;
    pendingImage = null;
  }

  function showPreview(src) {
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('preview-img').src = src;
  }

  function clearImageState() {
    document.getElementById('drop-zone').style.display = '';
    document.getElementById('preview-wrap').style.display = 'none';
    document.getElementById('preview-img').src = '';
    pendingImage = null;
  }

  function clearImage(e) {
    e.stopPropagation();
    clearImageState();
    document.getElementById('file-input').value = '';
  }

  document.getElementById('file-input').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      pendingImage = ev.target.result;
      showPreview(pendingImage);
      if (!document.getElementById('inp-title').value) {
        document.getElementById('inp-title').value = file.name.replace(/\.[^.]+$/, '').replace(/[_-]/g,' ');
      }
    };
    reader.readAsDataURL(file);
  });

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = ev => {
      pendingImage = ev.target.result;
      showPreview(pendingImage);
      if (!document.getElementById('inp-title').value) {
        document.getElementById('inp-title').value = file.name.replace(/\.[^.]+$/, '').replace(/[_-]/g,' ');
      }
    };
    reader.readAsDataURL(file);
  });

  function saveEntry() {
    const title = document.getElementById('inp-title').value.trim();
    const url = document.getElementById('inp-url').value.trim();
    if (!title) { document.getElementById('inp-title').focus(); return; }
    const entry = { title, url, image: pendingImage || null, added: new Date().toISOString() };
    if (editIdx !== null) entries[editIdx] = entry;
    else entries.push(entry);
    save();
    closeModal();
    render();
  }

  function deleteEntry() {
    if (editIdx === null) return;
    entries.splice(editIdx, 1);
    save();
    closeModal();
    render();
  }

  function openLightbox(e) {
    document.getElementById('lightbox-img').src = e.image;
    document.getElementById('lightbox-title').textContent = e.title;
    const urlEl = document.getElementById('lightbox-url');
    if (e.url) {
      urlEl.textContent = e.url;
      urlEl.href = e.url.startsWith('http') ? e.url : '#';
      urlEl.style.display = '';
    } else {
      urlEl.style.display = 'none';
    }
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeLightbox(); }
    if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')) {
      if (document.activeElement.tagName !== 'BUTTON') saveEntry();
    }
  });

  load();
</script>
</body>
</html>
